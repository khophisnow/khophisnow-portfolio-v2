name: Update GitHub feed

on:
  schedule:
    - cron: "17 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate feed
        run: node scripts/update-github-feed.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit feed update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update GitHub activity feed"
          file_pattern: public/github-feed.json
